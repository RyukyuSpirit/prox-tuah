node_name:
  description: "Enter specific node's context"
  is_variable: true
  type: "string"
  context:
    qemu:
      description: "Enter VMs context"
      return_type: "list"
      actions:
        get:
          description: "Get VMs"
          run_func: get
      context:
        vmid:
          description: "Enter specific VM's context"
          is_variable: true
          return_type: "list"
          context:
            agent:
              description: "QEMU Guest Agent Command Index"
              actions:
                get:
                  description: "Get QEMU Guest Agent Command list"
                  run_func: "get"
            clone:
              description: "Create a copy of virtual machine/template"
              actions:
                post:
                  description: "Create a copy of virtual machine/template"
                  run_func: "post"
                  params:
                    newid:
                      description: "VMID for the clone"
                      required: True
                    bwlimit:
                      description: "Override I/O bandwidth limit (in KiB/s)"
                    description:
                      description: "Description for the new VM"
                    format:
                      description: "Target format for file storage (raw|qcow2|vmdk). Only valid for full clone"
                    full:
                      description: "Create a full copy of all disks. Default for normal VMs, fallback for templates"
                    name:
                      description: "Set a name for the new VM"
                    pool:
                      description: "Add the new VM to the specified pool"
                    snapname:
                      description: "The name of the snapshot"
                    storage:
                      description: "Target storage for full clone"
                    target:
                      description: "Target node. Only allowed if the original VM is on the shared storage"
            cloudinit:
              description: "Cloudinit configuration"
              actions:
                get:
                  description: "Get cloudinit configuration"
                  run_func: "get"
            firewall:
              description: "Firewall context"
              actions:
                get:
                  description: "Get Firewall directory index"
                  run_func: "get"
            snapshot:
              description: "QEMU Snapshots"
              actions:
                get:
                  description: "List all snapshots"
                  run_func: "get"
            status:
              description: "Enter VM status context"
              actions:
                get:
                  description: "Get VM status"
                  run_func: "get"
              context:
                current:
                  description: "Current VM status"
                  actions:
                    get:
                      description: "Get current VM status"
                      run_func: "get"
                reboot:
                  description: "Reboot VM"
                  actions:
                    post:
                      description: "Reboot the VM by shutting it down, and starting it again. Applies pending changes."
                      run_func: "post"
                reset:
                  description: "Reset VM"
                  actions:
                    post:
                      description: "Reset VM"
                      run_func: "post"
                resume:
                  description: "Resume VM"
                  actions:
                    post:
                      description: "Resume VM"
                      run_func: "post"
                shutdown:
                  description: "Shutdown VM. This will send an ACPI event for the guest OS, which should then proceed to a clean shutdown"
                  actions:
                    post:
                      description: "Shutdown VM. This will send an ACPI event for the guest OS, which should then proceed to a clean shutdown"
                      run_func: "post"
                start:
                  description: "Start VM"
                  actions:
                    post:
                      description: "Start VM"
                      run_func: "post"
                stop:
                  description: "Stop virtual machine. The qemu process will exit immediately. This is akin to pulling the power plug of a running computer and may damage the VM data."
                  actions:
                    post:
                      description: "Stop virtual machine. The qemu process will exit immediately. This is akin to pulling the power plug of a running computer and may damage the VM data."
                      run_func: "post"
                suspend:
                  description: "Suspend VM"
                  actions:
                    post:
                      description: "Suspend VM"
                      run_func: "post"
            config:
              description: "VM configuration"
              actions:
                get:
                  description: "Get VM configuration"
                  run_func: "get"
#                post:
#                  description: "Set VM options (asynchronous)"
#                  run_func: "post"
#                  params:
#                    acpi:
#                      description: Enable/disable ACPI
              params:
                acpi:
                  type: "boolean"
                  description: "Enable/disable ACPI"
                affinity:
                  type: "string"
                  description: "List of host cores used to execute guest processes, for example: 0,5,8-11"
                agent:
                  type: "string"
                  description: "Enable/disable communication with the QEMU Guest Agent and its properties"
                memory:
                  type: "string"
                  description: "Memory properties"