description: Cluster backups
actions:
  docs:
    description: Open PVE API docs for this endpoint in web browser
  get:
    description: List vzdump backup schedule
  post:
    description: Create new vzdump backup job
    params:
      all:
        description: Backup all known guest systems on this host (<0|1>)
      bwlimit:
        description: Limit I/O bandwidth (in KiB/s)
      comment:
        description: Description for the job
      compress:
        description: Compress dump file (<0|1|gzip|lzo|zstd>)
      dow:
        description: Day of week selection
      dumpdir:
        description: Store resulting files to specified directory
      enabled:
        description: Enable or disable the job (<0|1>)
      exclude:
        description: Exclude specified guest systems (assumes --all)
      exclude-path:
        description: Exclude certain files/directories (shell globs)
      fleecing:
        description: Options for backup fleecing (VM only)
      id:
        description: Job ID (will be autogenerated)
      ionice:
        description: Set IO priority when using the BFQ scheduler
      lockwait:
        description: Maximal time to wait for the global lock (minutes)
      mailnotification:
        description: Specify when to send a notification mail
      mailto:
        description: Comma-separated list of email addresses or user that hsould receive email notifications
      maxfiles:
        description: Maximal number of backup files per guest system
      mode:
        description: Backup mode (<snapshot|suspend|stop>)
      node:
        description: Only run if executed on this node
      notes-template:
        description: Template string for generating notes for the backup(s)
      notification-mode:
        description: Determine which notification system to use (<auto|legacy-sendmail|notification-system>)
      pbs-change-detection-mode:
        description: PBS mode used to detect file changes and switch encoding format for container backups (<legacy|data|metadata>)
      performance:
        description: Other performance-related settings
      pigz:
        description: Use pigz instead of gzip when N>0
      pool:
        description: Backup all known guest systems included in the specified pool
      protected:
        description: Mark backup(s) as protected (<0|1>)
      prune-backups:
        description: Use these retention options instead of those from the storage configuration
      quiet:
        description: Be quiet (<0|1>)
      remove:
        description: Prune older backups according to 'prune-backups' (<0|1>)
      repeat-missed:
        description: Run job as soon as possible if it was missed while the scheduler was not running (<0|1>)
      schedule:
        description: Backup schedule
      script:
        description: Use specified hook script
      starttime:
        description: Job start time (<HH:MM>)
      stdexcludes:
        description: Exclude temporary files and logs (<0|1>)
      stop:
        description: Stop running backup jobs on this host
      stopwait:
        description: Maximal time to wait until a guest system is stopped (minutes)
      storage:
        description: Store resulting file to this storage
      tmpdir:
        description: Store temporary files to specified directory
      vmid:
        description: The ID of the guest system you want to backup
      zstd:
        description: Zstd threads. N=0 uses half of the available cores, otherwise N is used as thread count
