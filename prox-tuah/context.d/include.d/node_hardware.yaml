description: Node hardware
actions:
  get:
    description: Get index of hardware types
context:
  pci:
    description: Node PCI hardware
    actions:
      get:
        description: List local PCI devices
        params:
          pci-class-blacklist:
            description: A list of blacklisted PCI classes, which will not be returned
          verbose:
            description: Whether or not to print additional information (<0|1>)
    context:
      pci-id-or-mapping:
        is_variable: True
        description: PCI ID/mapping
        actions:
          get:
            description: Get index of available PCI methods
        context:
          mdev:
            description: Mediated device types
            actions:
              get:
                description: List mediated device types for given PCI device
  usb:
    description: Node USB hardware
    actions:
      get:
        description: List local USB devices