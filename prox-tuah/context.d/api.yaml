api:
  description: API mode
  context:
    access:
      description: PVE access
      actions:
        docs:
          description: Open PVE API docs for this endpoint in web browser
        get:
          description: Get access directory index
      context:
        !inc context.d/include.d/access.yaml
    cluster:
      description: PVE cluster
      actions:
        docs:
          description: Open PVE API docs for this endpoint in web browser
        get:
          description: Get access cluster index
      context:
        !inc context.d/include.d/cluster.yaml
    nodes:
      description: PVE nodes
      options_func: _get_node_names
      actions:
        docs:
          description: Open PVE API docs for this endpoint in web browser
        get:
          description: Get cluster node index
      context:
        node:
          description: PVE node
          is_var: true
          validation_func: validate_node
          actions:
            docs:
              description: Open PVE API docs for this endpoint in web browser
            get:
              description: Get cluster node index
          context:
            apt:
              !inc context.d/include.d/node_apt.yaml
            capabilities:
              !inc context.d/include.d/node_capabilities.yaml
            ceph:
              !inc context.d/include.d/node_ceph.yaml
            certificates:
              !inc context.d/include.d/node_certificates.yaml
            disks:
              !inc context.d/include.d/node_disks.yaml
            firewall:
              !inc context.d/include.d/node_firewall.yaml
            hardware:
              !inc context.d/include.d/node_hardware.yaml
            lxc:
              !inc context.d/include.d/node_lxc.yaml
            network:
              !inc context.d/include.d/node_network.yaml
            qemu:
              !inc context.d/include.d/node_qemu.yaml
            replication:
              !inc context.d/include.d/node_replication.yaml
            scan:
              !inc context.d/include.d/node_scan.yaml
            sdn:
              !inc context.d/include.d/node_sdn.yaml
            services:
              !inc context.d/include.d/node_services.yaml
            storage:
              !inc context.d/include.d/node_storage.yaml
            tasks:
              !inc context.d/include.d/node_tasks.yaml
            vzdump:
              !inc context.d/include.d/node_vzdump.yaml
            aplinfo:
              description: Node appliance info
              actions:
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                get:
                  description: Get list of appliances
                post:
                  description: Download appliance templates
                  params:
                    storage:
                      required: True
                      description: The storage where the template will be stored
                    template:
                      required: True
                      description: The template which will be downloaded
            config:
              description: Node configuration options
              actions:
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                get:
                  description: Get node configuration options
                  params:
                    property:
                      description: Return only a specific property from the node configuration
                put:
                  description: Set node configuration options
                  params:
                    acme:
                      description: Node specific ACME settings
                    acmedomain:
                      is_part_var: True
                      description: ACME domain and validation plugin
                    ballooning-target:
                      description: RAM usage target for ballooning, in percent of total mem (<0-100>)
                    delete:
                      description: A list of settings you want to delete
                    description:
                      description: Description for the node
                    digest:
                      description: Prevent changes if current configuration file has different SHA1 digest
                    startall-onboot-delay:
                      description: Initial delay in seconds, before starting all the Virtual Guests with on-boot enabled
                    wakeonlan:
                      description: Node specific wake on LAN settings
            dns:
              description: Node DNS settings
              actions:
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                get:
                  description: Read DNS settings
                put:
                  description: Write DNS settings
                  params:
                    search:
                      required: True
                      description: Search domain for host-name lookup
                    dns1:
                      description: First name server IP address
                    dns2:
                      description: Second name server IP address
                    dns3:
                      description: Third name server IP address
            execute:
              description: Node command execution (root only)
              actions:
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                post:
                  description: Execute multiple commands in order
                  params:
                    commands:
                      required: True
                      description: "JSON encoded array of commands, where each command is an object with the following properties: args, method, and path"
            hosts:
              description: Node hosts
              actions:
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                get:
                  description: Get the content of /etc/hosts
                post:
                  description: Write /etc/hosts
                  params:
                    data:
                      required: True
                      description: The target content of /etc/hosts
                    digest:
                      description: Prevent changes if current configuration file has a different digest
            journal:
              description: Node journal
              actions:
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                get:
                  description: Read journal
            migrateall:
              description: Node migration of all guests
              actions:
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                post:
                  description: Migrate all VMs and CTs
                  params:
                    target:
                      required: True
                      description: Target node
                    maxworkers:
                      description: Maximal number of parallel migration job
                    vms:
                      description: Only consider guests with these IDs
                    with-local-disks:
                      description: Enable live storage migration for local disk (<0|1>)
            netstat:
              description: Node netstat
              actions:
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                get:
                  description: Read tap/vm network device interface counters
            query-oci-repo-tags:
              description: Node OCI repository tags
              actions:
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                get:
                  description: List all tags for an OCI repository reference
                  params:
                    reference:
                      required: True
                      description: The reference to the repository to query tags from
            query-url-metadata:
              description: Node URL metadata query
              actions:
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                get:
                  description: Query metadata of an URL
                  params:
                    url:
                      required: True
                      description: The URL to query the metadata from
                    verify-certificates:
                      description: Verify SSL/TLS certificates (<0|1>)
            report:
              description: Node system report
              actions:
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                get:
                  description: Gather various systems information about a node
            rrd:
              description: Node RRD statitics (PNG)
              actions:
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                get:
                  description: Read node RRD statistics (returns PNG)
                  params:
                    ds:
                      required: True
                      description: The list of datasources you want to display
                    timeframe:
                      required: True
                      description: Specify the time fram you are interested in (<hour|day|week|month|year|decade>)
                    cf:
                      description: The RRD consolidation function (<AVERAGE|MAX>)
            rrddata:
              description: Node RRD statitics (data)
              actions:
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                get:
                  description: Read node RRD statistics
                  params:
                    timeframe:
                      required: True
                      description: Specify the time fram you are interested in (<hour|day|week|month|year|decade>)
                    cf:
                      description: The RRD consolidation function (<AVERAGE|MAX>)
            spiceshell:
              description: Node SPICE shell
              actions:
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                post:
                  description: Creates a SPICE shell
                  params:
                    cmd:
                      description: Run specific command or default to login (requires 'root@pam')
                    cmd-opts:
                      description: Add parameters to a command. Encoded as null terminated strings.
                    proxy:
                      description: Spice proxy server, or default to the current node
            startall:
              description: Node start operation on all guests
              actions:
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                post:
                  description: Start all VMs and CTs located on this node (by default only those with onboot=1)
                  params:
                    force:
                      description: Issue start command even if virtual guest have 'onboot' not set or set to off
                    vms:
                      description: Only consider guests from this comma-separated list of VMIDs
            status:
              description: Node status (query|reboot|shutdown)
              actions:
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                get:
                  description: Read node status
                post:
                  description: Reboot or shutdown a node
                  params:
                    command:
                      required: True
                      description: Specify the command (<reboot|shutdown>)
            stopall:
              description: Node stop operation on all guests
              actions:
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                post:
                  description: Stop all VMs and CTs
                  params:
                    force-stop:
                      description: Force a hard-stop after the timeout (<0|1>)
                    timeout:
                      description: Timeout for each guest shutdown task (<0-7200>)
                    vms:
                      description: Only consider guests with these IDs
            subscription:
              description: Node subscription
              actions:
                delete:
                  description: Delete subscription key of this node
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                get:
                  description: Read subscription info
                post:
                  description: Update subscription info
                  parameters:
                    force:
                      description: Always connect to server, even if local cache is still valid
                put:
                  description: Set subscription key
                  parameters:
                    key:
                      required: True
                      description: Proxmox VE subscription key
            suspendall:
              description: Node suspend operation on all guests
              actions:
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                post:
                  description: Suspend all VMs
                  params:
                    vms:
                      description: Only consider guests with these IDs
            syslog:
              description: Node system log
              actions:
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                get:
                  description: Read system log
                  params:
                    limit:
                      description: Display all logs up to this number
                    service:
                      description: Service ID
                    since:
                      description: Display all log since this date-time string
                    start:
                      description: Display all logs starting at this number
                    until:
                      description: Display all logs until this date-time string
            termproxy:
              description: Node terminal proxy
              actions:
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                get:
                  description: Creates a VNC shell proxy
                  params:
                    cmd:
                      description: Run specific command or default to login (requires 'root@pam')
                    cmd-opts:
                      description: Add parameters to a command. Encoded as null terminated strings.
            time:
              description: Node time and timezone settings
              actions:
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                get:
                  description: Read server time and time zone settings
                put:
                  description: Set time zone
                  params:
                    timezone:
                      required: True
                      description: Time zone (reference '/usr/share/zoneinfo/zone.tab' for valid names)
            version:
              description: Node API version details
              actions:
                docs:
                  description: Open PVE API docs for this endpoint in web browser
                get:
                  description: Get API version details
            vncshell:
              description: Node VNC shell proxy
              actions:
                post:
                  params:
                    cmd:
                      description: Run specific command or default to login (requires 'root@pam')
                    cmd-opts:
                      description: Add parameters to a command. Encoded as null terminated strings.
                    height:
                      description: Sets the height of the console in pixels
                    websocket:
                      description: use websocket instead of standard vnc
                    width:
                      description: Sets the width of the console in pixels
            vncwebsocket:
              description: Node VNC websocket
              actions:
                get:
                  description: Opens a websocket for VNC traffic
                  params:
                    port:
                      required: True
                      description: Port number returned by previous vncproxy call
                    vncticket:
                      required: True
                      description: Ticket from previous call to vncproxy
            wakeonlan:
              description: Node wake-on-LAN
              actions:
                get:
                  description: Try to wake a node via 'wake on LAN' network packet
    pools:
      description: "PVE pools"
      options_func: get_pools
      actions:
        delete:
          description: Delete pool
          params:
            poolid:
              required: True
              description: Pool ID
        docs:
          description: Open PVE API docs for this endpoint in web browser
        get:
          description: List pools or get pool configuration
          params:
            poolid:
              description: Pool ID
            type:
              description: Pool type (<qemu|lxc|storage>)
        post:
          description: Create new pool
          params:
            poolid:
              required: True
              description: Pool ID
            comment:
              description: Comment
        put:
          description: Update pool
          params:
            poolid:
              required: True
              description: Pool ID
            allow-move:
              description: Allow adding a guest even if already in another pool (<0|1>)
            comment:
              description: Comment
            delete:
              description: Remove the passed VMIDs and/or storage IDs instead of adding them (<0|1>)
            storage:
              description: List of storage IDs to add or remove from this pool
            vms:
              description: List of guest VMIDs to add or remove from this pool
      context:
        poolid:
          is_var: True
          description: Pool
          validation_func: validate_pool
          actions:
            delete:
              description: Delete pool
            docs:
              description: Open PVE API docs for this endpoint in web browser
            get:
              description: Get pool configuration
              params:
                type:
                  description: Pool type (<qemu|lxc|storage>)
            put:
              description: Update pool data
              params:
                allow-move:
                  description: Allow adding a guest even if already in another pool (<0|1>)
                comment:
                  description: Comment
                delete:
                  description: Remove the passed VMIDs and/or storage IDs instead of adding them (<0|1>)
                storage:
                  description: List of storage IDs to add or remove from this pool
                vms:
                  description: List of guest VMIDs to add or remove from this pool
    storage:
      description: "PVE storage"
      actions:
        docs:
          description: Open PVE API docs for this endpoint in web browser
        get:
          description: Get storage index
          params:
            type:
              description: Only list storage of specific type
        post:
          description: Create a new storage
          params:
            storage:
              required: True
              description: The storage identifier
            type:
              required: True
              description: Storage type
            authsupported:
              description: Authsupported
            base:
              description: Base volume
            blocksize:
              description: Block size
            bwlimit:
              description: Set I/O bandwidthf or various operations (in KiB/s)
            comstar_hg:
              description: Host group for comstar views
            comstar_tg:
              description: Target group for comstar views
            content:
              description: Allowed content types
            content-dirs:
              description: Overrides for default content type directories
            create-base-path:
              description: Create the base directory if it doesn't exist (<0|1>)
            create-subdirs:
              description: Populate the directory with the default structure (<0|1>)
            data-pool:
              description: Data pool (for erasure coding only)
            datastore:
              description: Proxmox Backup Server datastore name
            disable:
              description: Flag to disable the storage
            domain:
              description: CIFS domain
            encryption-key:
              description: Encryption key
            export:
              description: NFS export path
            fingerprint:
              description: Certificate SHA-256 fingerprint
            format:
              description: Default image format (<raw|qcow2|subvol|vmdk>)
            fs-name:
              description: The Ceph filesystem name
            fuse:
              description: Mount CephFS through FUSE (<0|1>)
            is_mountpoint:
              description: Assume the given path is an externally managed mountpoint and consider the storage offline if it is not mounted
            iscsiprovider:
              description: iscsi provider
            keyring:
              description: Client keyring contents (for external clusters)
            krbd:
              description: Always access rbd through krbd kernel module
            lio_tpg:
              description: Target portal group for Linux LIO targets
            master-pubkey:
              description: Base64-encoded, PEM-formatted public RSA key
            max-protected-backups:
              description: Maximal number of protected backups per guest(<-1-N>, '-1' for unlimited)
            mkdir:
              description: Create the directory if it doesn't exist and populate it with default sub-dirs
            monhost:
              description: IP addresses of monitors (for external clusters)
            mountpoint:
              description: Mount point
            namespace:
              description: Namespace
            nocow:
              description: Set the NOCOW flag on files (<0|1>)
            nodes:
              description: List of nodes for which the storage configuration applies
            nowritecache:
              description: Disable write caching on the target
            options:
              description: NFS/CIFS mount options
            password:
              description: Password for accessing the share/datastore
            path:
              description: File system path
            pool:
              description: Pool
            port:
              description: Use this port to connect to the storage instead of the default one (<1-65535>)
            portal:
              description: iSCSI portal (IP or DNS name with optional port)
            preallocation:
              description: Preallocation mode for raw and qcow2 images (<off|metadata|falloc|full>)
            prune-backups:
              description: The retention options with shorter intervals are processed first with --keep-last being the very first one
            saferemove:
              description: Zero-out data when removing LVs (<0|1>)
            saferemove-stepsize:
              description: Wipe step size in MiB (<1|2|4|8|16|32>)
            saferemove-throughput:
              description: Wipe throughput (cstream -t parameter value)
            server:
              description: Server IP or DNS name
            share:
              description: CIFS share
            shared:
              description: Indicate that this is a single storage with the same contents on all nodes (<0|1>)
            skip-cert-verification:
              description: Disable TLS certificate verification, only enable on fully trusted networks! (<0|1>)
            smbversion:
              description: SMB protocol version (<default|2.0|2.1|3|3.0|3.11>)
            snapshot-as-volume-chain:
              description: Enable support for creating storage-vendor agnostic snapshot through volume backing-chains (<0|1>)
            sparse:
              description: Use sparse volumes
            subdir:
              description: Subdir to mount
            tagged_only:
              description: Only use logical volumes tagged with 'pve-vm-ID'
            target:
              description: iSCSI target
            thinpool:
              description: LVM thin pool LV name
            username:
              description: RBD ID
            vgname:
              description: Volume group name
            zfs-base-path:
              description: Base path where to look for the created ZFS block devices
      context:
        storage:
          is_var: True
          description: Storage
          actions:
            delete:
              description: Delete storage configuration
            docs:
              description: Open PVE API docs for this endpoint in web browser
            get:
              description: Read storage configuration
            put:
              description: Update storage configuration
              params:
                blocksize:
                  description: Block size
                bwlimit:
                  description: Set I/O bandwidthf or various operations (in KiB/s)
                comstar_hg:
                  description: Host group for comstar views
                comstar_tg:
                  description: Target group for comstar views
                content:
                  description: Allowed content types
                content-dirs:
                  description: Overrides for default content type directories
                create-base-path:
                  description: Create the base directory if it doesn't exist (<0|1>)
                create-subdirs:
                  description: Populate the directory with the default structure (<0|1>)
                data-pool:
                  description: Data pool (for erasure coding only)
                delete:
                  description: A list of settings you want to delete
                digest:
                  description: Prevent changes if current configuration file has a different digest
                disable:
                  description: Flag to disable the storage
                domain:
                  description: CIFS domain
                encryption-key:
                  description: Encryption key
                fingerprint:
                  description: Certificate SHA-256 fingerprint
                format:
                  description: Default image format (<raw|qcow2|subvol|vmdk>)
                fs-name:
                  description: The Ceph filesystem name
                fuse:
                  description: Mount CephFS through FUSE (<0|1>)
                is_mountpoint:
                  description: Assume the given path is an externally managed mountpoint and consider the storage offline if it is not mounted
                keyring:
                  description: Client keyring contents (for external clusters)
                krbd:
                  description: Always access rbd through krbd kernel module
                lio_tpg:
                  description: Target portal group for Linux LIO targets
                master-pubkey:
                  description: Base64-encoded, PEM-formatted public RSA key
                max-protected-backups:
                  description: Maximal number of protected backups per guest(<-1-N>, '-1' for unlimited)
                mkdir:
                  description: Create the directory if it doesn't exist and populate it with default sub-dirs
                monhost:
                  description: IP addresses of monitors (for external clusters)
                mountpoint:
                  description: Mount point
                namespace:
                  description: Namespace
                nocow:
                  description: Set the NOCOW flag on files (<0|1>)
                nodes:
                  description: List of nodes for which the storage configuration applies
                nowritecache:
                  description: Disable write caching on the target
                options:
                  description: NFS/CIFS mount options
                password:
                  description: Password for accessing the share/datastore
                pool:
                  description: Pool
                port:
                  description: Use this port to connect to the storage instead of the default one (<1-65535>)
                preallocation:
                  description: Preallocation mode for raw and qcow2 images (<off|metadata|falloc|full>)
                prune-backups:
                  description: The retention options with shorter intervals are processed first with --keep-last being the very first one
                saferemove:
                  description: Zero-out data when removing LVs (<0|1>)
                saferemove-stepsize:
                  description: Wipe step size in MiB (<1|2|4|8|16|32>)
                saferemove-throughput:
                  description: Wipe throughput (cstream -t parameter value)
                server:
                  description: Server IP or DNS name
                shared:
                  description: Indicate that this is a single storage with the same contents on all nodes (<0|1>)
                skip-cert-verification:
                  description: Disable TLS certificate verification, only enable on fully trusted networks! (<0|1>)
                smbversion:
                  description: SMB protocol version (<default|2.0|2.1|3|3.0|3.11>)
                snapshot-as-volume-chain:
                  description: Enable support for creating storage-vendor agnostic snapshot through volume backing-chains (<0|1>)
                sparse:
                  description: Use sparse volumes
                subdir:
                  description: Subdir to mount
                tagged_only:
                  description: Only use logical volumes tagged with 'pve-vm-ID'
                username:
                  description: RBD ID
                zfs-base-path:
                  description: Base path where to look for the created ZFS block devices
    version:
      description: "PVE version"
      actions:
        docs:
          description: Open PVE API docs for this endpoint in web browser
        get:
          description: "Get API version details, including some parts of the global datacenter config"