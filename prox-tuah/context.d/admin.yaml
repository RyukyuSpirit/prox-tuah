admin:
  description: "Enter ADMIN mode"
  can_get: false
  context:
    vm:
      description: "VM context"
      actions:
        show:
          description: "Show all VMs"
          run_func: show_vms
          params:
            scope:
              is_variable: True
              description: "(brief|detail|config) Amount of info to return per VM (Options: brief|detail|config)"
      context:
        vmid:
          is_variable: True
          description: "Enter specific VM's context"
          actions:
            show:
              description: "Show VM configuration"
              run_func: show_vm
              params:
                scope:
                  is_variable: True
                  description: "(brief|detail|config) Type of information about the VM to return"
            connect:
              description: "Connect to VM (Default: SPICE)"
              run_func: connect_vm
            clone:
              description: "Clone VM"
              run_func: clone_vm
              params:
                newid:
                  description: "VMID for the clone"
                  required: True
                name:
                  description: "Name for the clone"
            delete:
              description: "Delete VM"
              run_func: delete_vm
            edit:
              description: "Edit VM configuration"
              params:
                cores:
                  description: "Number of cores per socket"
                memory:
                  description: "Amount of memory in MB"
                sockets:
                  description: "Number of CPU sockets"
            show:
              description: "Show VM configuration"