admin:
  description: "Admin mode"
  context:
    iso:
      description: ISO images
      actions:
        delete:
          description: Delete ISO
          run_func: delete_iso
          params:
            filename:
              required: True
              is_var: True
              description: Name of ISO to delete
        download:
          description: Download ISO from URL
          run_func: download_iso
          params:
            filename:
              required: True
              description: Name to save ISO as
            url:
              required: True
              description: URL to download
            node:
              description: Node that contains the storage for the ISO (defaults to random)
            storage:
              description: Storage to save ISO to (defaults to random)
        show:
          description: show all ISOs
          run_func: show_isos
          params:
            brief:
              is_fixed: True
              description: "Show brief information"
            detail:
              is_fixed: True
              description: "Show detailed information"
            storage:
              is_fixed: True
              description: "Show ISO storage/node"
    network:
      description: Networks
      actions:
        add:
          description: Add a network (bond/bridge/vlan)
          run_func: add_network_device
          params:
            iface:
              required: True
              description: Network interface name
            type:
              required: True
              description: Network interface type (<bridge|bond|eth|alias|...>)
            address:
              description: IPv4 address
            address6:
              description: IPv4 address
            autostart:
              description: Automatically start interface on boot (<0|1>)
            bond-primary:
              description: Specify the primary interface for active-backup bond
            bond-mode:
              description: Bonding mode (<balance-rr|active-backup|balance-xor|...>)
            bond_xmit_hash_policy:
              description: Selects the transmit hash policy to use for slave selection in balance-xor and 802.3ad modes
            bridge_ports:
              description: Specify the interfaces you want to add to your bridge
            bridge_vids:
              description: Specify the allowed VLANS (ex. "2 4 100-200")
            bridge_vlan_aware:
              description: Enable bridge vlan support (<0|1>)
            cidr:
              description: IPv4 CIDR
            cidr6:
              description: IPv6 CIDR
            comments:
              description: Comments (v4)
            comments6:
              description: Comments (v6)
            gateway:
              description: Default gateway address (v4)
            gateway6:
              description: Default gateway address (v6)
            mtu:
              description: Maximum transmission unit (<1280-65520>)
            netmask:
              description: Network mask (v4)
            netmask6:
              description: Network mask (v6)
            node:
              description: "Node to add network device to (default: ALL)"
            ovs_bonds:
              description: Specify the interfaces used by the bonding device
            ovs_bridge:
              description: The OVS bridge associated with a OVS port
            ovs_options:
              description: OVS interface options
            ovs_ports:
              description: Specify the interfaces you want to add to our bridge
            ovs_tag:
              description: Specify a VLAN tag, used by OVSPort, OVSIntPort, OVSBond (<1-4094>)
            slaves:
              description: Specify the interfaces used by the bonding device
            vlan-id:
              description: VLAN-id for a custom named vlan interface (<1-4094>)
            vlan-raw-device:
              description: Specify the raw interface for the vlan interface
        edit:
          description: Edit network device configuration
          run_func: edit_network_device
          params:
            iface:
              required: True
              description: Network interface name
            type:
              required: True
              description: Network interface type (<bridge|bond|eth|alias|...>)
            address:
              description: IPv4 address
            address6:
              description: IPv6 address
            autostart:
              description: Automatically start interface on boot (<0|1>)
            bond-primary:
              description: Specify the primary interface for active-backup bond
            bond-mode:
              description: Bonding mode (<balance-rr|active-backup|balance-xor|...>)
            bond_xmit_hash_policy:
              description: Selects the transmit hash policy to use for slave selection in balance-xor and 802.3ad modes
            bridge_ports:
              description: Specify the interfaces you want to add to your bridge
            bridge_vids:
              description: Specify the allowed VLANS (ex. "2 4 100-200")
            bridge_vlan_aware:
              description: Enable bridge vlan support (<0|1>)
            cidr:
              description: IPv4 CIDR
            cidr6:
              description: IPv6 CIDR
            comments:
              description: Comments (v4)
            comments6:
              description: Comments (v6)
            delete:
              description: A list of settings you want to delete
            gateway:
              description: Default gateway address (v4)
            gateway6:
              description: Default gateway address (v6)
            mtu:
              description: Maximum transmission unit (<1280-65520>)
            netmask:
              description: Network mask (v4)
            netmask6:
              description: Network mask (v6)
            node:
              description: "Node to reload network on (default: ALL)"
            ovs_bonds:
              description: Specify the interfaces used by the bonding device
            ovs_bridge:
              description: The OVS bridge associated with a OVS port
            ovs_options:
              description: OVS interface options
            ovs_ports:
              description: Specify the interfaces you want to add to our bridge
            ovs_tag:
              description: Specify a VLAN tag, used by OVSPort, OVSIntPort, OVSBond (<1-4094>)
            slaves:
              description: Specify the interfaces used by the bonding device
            vlan-id:
              description: VLAN-id for a custom named vlan interface (<1-4094>)
            vlan-raw-device:
              description: Specify the raw interface for the vlan interface
        show:
          description: Show all networks
          run_func: show_networks
          params:
            brief:
              is_fixed: True
              description: "Show brief information"
            detail:
              is_fixed: True
              description: "Show detailed information"
        reload:
          description: Reload network configuration (apply pending changes)
          run_func: reload_network
          params:
            node:
              description: "Node to reload network on (default: ALL)"
        remove:
          description: Remove network device
          run_func: remove_network_device
          params:
            iface:
              required: True
              description: Network interface name
            node:
              description: "Node to remove network device from (default: ALL)"
    node:
      description: PVE nodes
      actions:
        show:
          description: Show all nodes
          run_func: show_nodes
          params:
            brief:
              is_fixed: True
              description: "Show brief information"
            detail:
              is_fixed: True
              description: "Show detailed information"
    pool:
      description: Resource pools
      actions:
        add_members:
          description: Add member(s) to pool
          run_func: add_pool_members
          params:
            pool:
              required: True
              description: Pool to add member(s) to
            vms:
              required: True
              description: VMIDs (comma-separated) of VMs to add to pool
        create:
          description: Create new pool
          run_func: create_pool
          params:
            name:
              required: True
              description: Pool name (poolid)
            comment:
              description: Pool comment
        delete:
          description: Delete pool
          run_func: delete_pool
          params:
            name:
              required: True
              description: Pool name (poolid)
        show:
          description: Show all pools
          run_func: show_pools
          params:
            brief:
              is_fixed: True
              description: "Show brief information"
            detail:
              is_fixed: True
              description: "Show detailed information"
        remove_members:
          description: Remove member(s) from pool
          run_func: remove_pool_members
          params:
            pool:
              required: True
              description: Pool to remove member(s) from
            vms:
              required: True
              description: VMIDs (comma-separated) of VMs to remove from pool
    template:
      description: "Templates"
      actions:
        delete:
          description: "Delete template(s)"
          run_func: delete_templates
          params:
            vmid(s):
              is_var: True
              description: Delete template or templates (comma-separated if multiple)
        show:
          description: "Show all templates"
          run_func: show_templates
          params:
            brief:
              is_fixed: True
              description: "Show brief information"
            detail:
              is_fixed: True
              description: "Show detailed information"
      context:
        vmid:
          is_var: True
          description: "VMID"
          actions:
            clone:
              description: "Clone template to VM"
              run_func: clone_template
              params:
                newid:
                  description: "templateID for the clone (defaults to next available)"
                name:
                  description: "Name for the clone"
            delete:
              description: "Delete template"
              run_func: delete_template
            edit:
              description: "Edit template configuration"
              run_func: edit_template
              params:
                cores:
                  description: "Number of cores per socket"
                memory:
                  description: "Amount of memory in MB"
                sockets:
                  description: "Number of CPU sockets"
            show:
              description: "Show template information"
              run_func: show_template_info
              params:
                brief:
                  is_fixed: True
                  description: Show template information (brief)
                default:
                  is_fixed: True
                  description: Show template information
    vm:
      description: "Virtual machines"
      options_func: get_vmids
      options_display_func: get_vmids_names_string
      actions:
        delete:
          description: "Delete VM(s)"
          run_func: delete_vms
          params:
            vmid(s):
              is_var: True
              description: Delete VM or VMs (comma-separated if multiple)
        show:
          description: "Show all VMs"
          run_func: show_vms
          params:
            brief:
              is_fixed: True
              description: "Show brief information (default)"
            detail:
              is_fixed: True
              description: "Show detailed information"
            ip:
              is_fixed: True
              description: "Show IP information"
      context:
        vmid:
          is_var: True
          validation_func: validate_vmid
          description: "Virtual machine"
          actions:
            clone:
              description: "Clone VM"
              run_func: clone_vm
              params:
                newid:
                  description: "VMID for the clone (defaults to next available)"
                name:
                  description: "Name for the clone"
            connect:
              description: "Connect to VM (default: SPICE)"
              run_func: connect_vm
              params:
                protocol:
                  description: Connection protocol (<spice>)
            delete:
              description: "Delete VM"
              run_func: delete_vm
            edit:
              description: "Edit VM configuration"
              run_func: edit_vm
              params:
                cores:
                  description: "Number of cores per socket"
                memory:
                  description: "Amount of memory in MB"
                sockets:
                  description: "Number of CPU sockets"
            power:
              description: "Change VM power status"
              run_func: change_vm_status
              params:
                reboot:
                  is_fixed: True
                  description: Reboot VM
                shutdown:
                  is_fixed: True
                  description: Shutdown VM (clean)
                  run_func: change_vm_status
                start:
                  is_fixed: True
                  description: Start VM
                  run_func: change_vm_status
                stop:
                  is_fixed: True
                  description: Stop VM (immediate)
                  run_func: change_vm_status
            show:
              description: "Show VM information"
              run_func: show_vm_info
              params:
                brief:
                  is_fixed: True
                  description: Show VM information (brief)
                default:
                  is_fixed: True
                  description: Show VM information
                power:
                  is_fixed: True
                  description: Show VM power status
            template:
              description: "Convert VM to template"
              run_func: template_vm