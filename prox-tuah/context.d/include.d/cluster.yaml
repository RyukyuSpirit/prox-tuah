acme:
  !inc context.d/include.d/cluster_acme.yaml
backup:
  !inc context.d/include.d/cluster_backup.yaml
backup-info:
  description: Cluster backup info
  actions:
    docs:
      description: Open PVE API docs for this endpoint in web browser
    get:
      description: List index for backup info related endpoints
  context:
    not-backed-up:
      description: Guests which are not covered by any backup job
      actions:
        docs:
          description: Open PVE API docs for this endpoint in web browser
        get:
          description: Shows all guests which are not covered by any backup job
bulk-action:
  description: Cluster bulk actions
  actions:
    docs:
      description: Open PVE API docs for this endpoint in web browser
    get:
      description: List resource types for bulk actions
  context:
    guest:
      description: Bulk actions against guests
      actions:
        docs:
          description: Open PVE API docs for this endpoint in web browser
        get:
          description: Get bulk action index
      context:
        migrate:
          description: Bulk migration
          actions:
            docs:
              description: Open PVE API docs for this endpoint in web browser
            post:
              description: Bulk migrate all guests on the cluster
              params:
                target:
                  required: True
                  description: Target node
                maxworkers:
                  description: How many parallel tasks at maximum should be started
                online:
                  description: Enable live migration for VMs and restart migration for CTs
                vms:
                  description: Only consider guests from this list of VMIDs
                with-local-disks:
                  description: Enable live storage migration for local disk (<0|1>)
        shutdown:
          description: Bulk shutdown
          actions:
            docs:
              description: Open PVE API docs for this endpoint in web browser
            post:
              description: Bulk shutdown all guests on the cluster
              params:
                force-stop:
                  description: Makes sure the guest stops after the timeout (<0|1>)
                maxworkers:
                  description: How many parallel tasks at maximum should be started
                timeout:
                  description: Default shutdown timeout in seconds if none is configured for the guest
                vms:
                  description: Only consider guests from this list of VMIDs
        start:
          description: Bulk start
          actions:
            docs:
              description: Open PVE API docs for this endpoint in web browser
            post:
              description: Bulk start all guests on the cluster
              params:
                maxworkers:
                  description: How many parallel tasks at maximum should be started
                timeout:
                  description: Default start timeout in seconds
                vms:
                  description: Only consider guests from this list of VMIDs
        suspend:
          description: Bulk suspend
          actions:
            docs:
              description: Open PVE API docs for this endpoint in web browser
            post:
              description: Bulk suspend all guests on the cluster
              params:
                maxworkers:
                  description: How many parallel tasks at maximum should be started
                statestorage:
                  description: The storage for the VM state
                to-disk:
                  description: Suspend the guests to disk (<0|1>)
                vms:
                  description: Only consider guests from this list of VMIDs
ceph:
  description: Cluster Ceph
  actions:
    docs:
      description: Open PVE API docs for this endpoint in web browser
    get:
      description: Get cluster Ceph index
  context:
    flags:
      description: Ceph flags
      actions:
        docs:
          description: Open PVE API docs for this endpoint in web browser
        get:
          description: Get the status of all ceph flags
        put:
          description: Set/unset multiple ceph flags at once
          params:
            nobackfill:
              description: Backfilling of PGs is suspended (<0|1>)
            nodeep-scrub:
              description: Deep scrubbing is disabled (<0|1>)
            nodown:
              description: OSD failure reports are being ignored, such that the monitors will not mark OSDs down (<0|1>)
            noin:
              description: OSDs that were previously marked out will not be marked back in when they start (<0|1>)
            noout:
              description: OSDs will not automatically be marked out after the configured intervale (<0|1>)
            norebalance:
              description: Rebalancing of PGs is suspended (<0|1>)
            norecover:
              description: Recovery of PGs is suspended (<0|1>)
            noscrub:
              description: Scrubbing is disabled (<0|1>)
            notieragent:
              description: Cache tiering activity is suspended (<0|1>)
            noup:
              description: OSDs are not allowed to start (<0|1>)
            pause:
              description: Pauses read and writes (<0|1>)
      context:
        flag:
          is_var: True
          description: Flag status
          actions:
            docs:
              description: Open PVE API docs for this endpoint in web browser
            get:
              description: Get the status of a specific ceph flag
            put:
              description: Set or clear (unset) a specific ceph flag
              params:
                value:
                  required: True
                  description: The new value of the flag
    metadata:
      description: Ceph metadata
      actions:
        docs:
          description: Open PVE API docs for this endpoint in web browser
        get:
          description: Get Ceph metadata
          params:
            scope:
              description: Scope (<all|versions>)
    status:
      description: Ceph status
      actions:
        docs:
          description: Open PVE API docs for this endpoint in web browser
        get:
          description: Get Ceph status
config:
  !inc context.d/include.d/cluster_config.yaml
firewall:
  !inc context.d/include.d/cluster_firewall.yaml
ha:
  !inc context.d/include.d/cluster_ha.yaml
jobs:
  !inc context.d/include.d/cluster_jobs.yaml
mapping:
  !inc context.d/include.d/cluster_mapping.yaml
metrics:
  !inc context.d/include.d/cluster_metrics.yaml
notifications:
  !inc context.d/include.d/cluster_notifications.yaml
replication:
  !inc context.d/include.d/cluster_replication.yaml
sdn:
  !inc context.d/include.d/cluster_sdn.yaml
log:
  description: Cluster log
  actions:
    docs:
      description: Open PVE API docs for this endpoint in web browser
    get:
      description: Read cluster log
      params:
        max:
          description: Maximum number of entries (<1-N>)
nextid:
  description: Cluster next free VMID
  actions:
    docs:
      description: Open PVE API docs for this endpoint in web browser
    get:
      description: Get next free VMID. Pass a VMID to assert that it's free (at time of check)
      params:
        vmid:
          description: The (unique) ID of the VM
options:
  description: Cluster options
  actions:
    docs:
      description: Open PVE API docs for this endpoint in web browser
    get:
      description: Get datacenter options
    put:
      description: Set datacenter options
      params:
        bwlimit:
          description: Set I/O bandwidth limit for various operations
        consent-text:
          description: Consent text that is displayed before logging in
        console:
          description: Select the default Console viewer (<applet|vv|html5|xtermjs>)
        crs:
          description: Cluster resource scheduling settings
        delete:
          description: A list of settings you want to delete
        description:
          description: Datacenter description
        email_from:
          description: Specify email address to send notification from (default is root@$hostname)
        fencing:
          description: Set the fencing mode of the HA cluster (<watchdog|hardware|both>)
        ha:
          description: Cluster wide HA settings
        http_proxy:
          description: Specify external http proxy which is used for downloadsi (ex. 'http://username:password@host:port/')
        keyboard:
          description: Default keyboard layout for vnc server
        language:
          description: Default GUI language
        mac_prefix:
          description: Prefix for the auto-generated MAC addresses of virtual guests
        max_workers:
          description: Defines how many workers (per node) are maximal started on actions like 'stopall VMs' or tasks from the HA-manager
        migration:
          description: For cluster-wide migration settings
        migration_unsecure:
          description: Migration is secure using SSH tunnel by default
        next-id:
          description: Control the range for free VMID auto-selection pool
        notify:
          description: Cluster-wide notification settings
        registered-tags:
          description: A list of tags that require a 'Sys.Modify' on '/' to set delete
        replication:
          description: For cluster wide replication settings
        tag-style:
          description: Tag style options
        u2f:
          description: u2f
        user-tag-access:
          description: Privilege options for user-settable tags
        webauthn:
          description: webauthn configuration
resources:
  description: Cluster resources
  actions:
    docs:
      description: Open PVE API docs for this endpoint in web browser
    get:
      description: Get resources list (cluster-wide)
      params:
        type:
          description: Resource type (<vm|storage|node|sdn>)
status:
  description: Cluster status
  actions:
    docs:
      description: Open PVE API docs for this endpoint in web browser
    get:
      description: Get cluster status information
tasks:
  description: Cluster tasks
  actions:
    docs:
      description: Open PVE API docs for this endpoint in web browser
    get:
      description: Get cluster tasks