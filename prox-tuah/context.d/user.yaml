user:
  description: "Enter USER mode"
  can_get: false
  context:
    vm:
      description: "VM context"
      actions:
        list:
          description: "List all VMs"
          run_func: show_vms
          params:
            scope:
              is_var: True
              description: "(brief|detail|config) Amount of info to return per VM (Options: brief|detail|config)"
      context:
        vmid:
          is_var: True
          description: "Virtual machine"
          context:
            connect:
              description: "Connect to VM"
              actions:
                spice:
                  description: Connect via SPICE
                  run_func: connect_vm
            power:
              description: "Change VM power status"
              actions:
                reboot:
                  description: Reboot VM
                  run_func: change_vm_status
                shutdown:
                  description: Shutdown VM (clean)
                  run_func: change_vm_status
                start:
                  description: Start VM
                  run_func: change_vm_status
                stop:
                  description: Stop VM (immediate)
                  run_func: change_vm_status
            show:
              description: "Show VM information"
              actions:
                status:
                  description: Show VM power status
                  run_func: show_vm_status