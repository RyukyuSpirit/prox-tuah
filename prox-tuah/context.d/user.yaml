user:
  description: "Enter USER mode"
  can_get: false
  context:
    vm:
      description: "VM context"
      actions:
        show:
          description: "Show all VMs"
          run_func: show_vms
          params:
            scope:
              is_variable: True
              description: "(brief|detail|config) Amount of info to return per VM (Options: brief|detail|config)"
      context:
        vmid:
          is_variable: True
          description: "Enter specific VM's context"
          context:
            status:
              description: "VM power status"
              actions:
                show:
                  description: Show VM power status
                  run_func: show_vm_status
                shutdown:
                  description: Shutdown VM (clean)
                  run_func: change_vm_status
                start:
                  description: Start VM
                  run_func: change_vm_status
                stop:
                  description: Stop VM (immediate)
                  run_func: change_vm_status
          actions:
            connect:
              description: "Connect to VM (Default: SPICE)"
              run_func: connect_vm
            show:
              description: "Show VM configuration"
              run_func: show_vm
              params:
                scope:
                  is_variable: True
                  description: "(brief|detail|config) Type of information about the VM to return"
