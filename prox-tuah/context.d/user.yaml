user:
  description: "User mode"
  context:
    token:
      description: "API tokens"
      actions:
        create:
          description: "Create token"
          run_func: create_token
          params:
            tokenid:
              description: Token identifer
              required: True
            comment:
              description: Token description
            privsep:
              description: Whether token privileges should be restricted with separate ACLs from user (<0|1>)
        delete:
          description: "Delete token"
          run_func: delete_token
          params:
            tokenid:
              description: Token identifer
              required: True
        show:
          description: "Show API tokens"
          run_func: show_tokens
          params:
            user:
              description: "Show current user's tokens"
              is_fixed: True
            all:
              description: "Show all users' tokens"
              is_fixed: True
    vm:
      description: "Virtual machines"
      options_func: get_vmids
      options_display_func: get_vmids_names_string
      actions:
        show:
          description: "Show all VMs"
          run_func: show_vms
          params:
            brief:
              is_fixed: True
              description: "Show brief information (default)"
            detail:
              is_fixed: True
              description: "Show detailed information"
            ip:
              is_fixed: True
              description: "Show IP information"
      context:
        vmid:
          is_var: True
          validation_func: validate_vmid
          description: "Virtual machine"
          actions:
            connect:
              description: "Connect to VM (default: SPICE)"
              run_func: connect_vm
              params:
                ip:
                  description: IP option number (options returned when multiple IPs are present)
                port:
                  description: Port number
                protocol:
                  description: Connection protocol, see connect_commands in config (<spice|ssh|rdp>)
                user:
                  description: Username, if applicable
            power:
              description: "Change VM power status"
              run_func: change_vm_status
              params:
                reboot:
                  is_fixed: True
                  description: Reboot VM
                shutdown:
                  is_fixed: True
                  description: Shutdown VM (clean)
                  run_func: change_vm_status
                start:
                  is_fixed: True
                  description: Start VM
                  run_func: change_vm_status
                stop:
                  is_fixed: True
                  description: Stop VM (immediate)
                  run_func: change_vm_status
            show:
              description: "Show VM information"
              run_func: show_vm_info
              params:
                brief:
                  is_fixed: True
                  description: Show VM information (brief)
                default:
                  is_fixed: True
                  description: Show VM information
                power:
                  is_fixed: True
                  description: Show VM power status