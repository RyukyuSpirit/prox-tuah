acme:
  !inc context.d/include.d/cluster_acme.yaml
backup:
  !inc context.d/include.d/cluster_backup.yaml
backup-info:
  description: Cluster backup info
  actions:
    docs:
      description: Open PVE API docs for this endpoint in web browser
    get:
      description: List index for backup info related endpoints
  context:
    not-backed-up:
      description: Guests which are not covered by any backup job
      actions:
        docs:
          description: Open PVE API docs for this endpoint in web browser
        get:
          description: Shows all guests which are not covered by any backup job
bulk-action:
  description: Cluster bulk actions
  actions:
    docs:
      description: Open PVE API docs for this endpoint in web browser
    get:
      description: List resource types for bulk actions
  context:
    guest:
      description: Bulk actions against guests
      actions:
        docs:
          description: Open PVE API docs for this endpoint in web browser
        get:
          description: Get bulk action index
      context:
        migrate:
          description: Bulk migration
          actions:
            docs:
              description: Open PVE API docs for this endpoint in web browser
            post:
              description: Bulk migrate all guests on the cluster
              params:
                target:
                  required: True
                  description: Target node
                maxworkers:
                  description: How many parallel tasks at maximum should be started
                online:
                  description: Enable live migration for VMs and restart migration for CTs
                vms:
                  description: Only consider guests from this list of VMIDs
                with-local-disks:
                  description: Enable live storage migration for local disk (<0|1>)
        shutdown:
          description: Bulk shutdown
          actions:
            docs:
              description: Open PVE API docs for this endpoint in web browser
            post:
              description: Bulk shutdown all guests on the cluster
              params:
                force-stop:
                  description: Makes sure the guest stops after the timeout (<0|1>)
                maxworkers:
                  description: How many parallel tasks at maximum should be started
                timeout:
                  description: Default shutdown timeout in seconds if none is configured for the guest
                vms:
                  description: Only consider guests from this list of VMIDs
        start:
          description: Bulk start
          actions:
            docs:
              description: Open PVE API docs for this endpoint in web browser
            post:
              description: Bulk start all guests on the cluster
              params:
                maxworkers:
                  description: How many parallel tasks at maximum should be started
                timeout:
                  description: Default start timeout in seconds
                vms:
                  description: Only consider guests from this list of VMIDs
        suspend:
          description: Bulk suspend
          actions:
            docs:
              description: Open PVE API docs for this endpoint in web browser
            post:
              description: Bulk suspend all guests on the cluster
              params:
                maxworkers:
                  description: How many parallel tasks at maximum should be started
                statestorage:
                  description: The storage for the VM state
                to-disk:
                  description: Suspend the guests to disk (<0|1>)
                vms:
                  description: Only consider guests from this list of VMIDs
ceph:
  description: Cluster Ceph
  actions:
    docs:
      description: Open PVE API docs for this endpoint in web browser
    get:
      description: Get cluster Ceph index
  context:
    flags:
      description: Ceph flags
      actions:
        docs:
          description: Open PVE API docs for this endpoint in web browser
        get:
          description: Get the status of all ceph flags
        put:
          description: Set/unset multiple ceph flags at once
          params:
            nobackfill:
              description: Backfilling of PGs is suspended (<0|1>)
            nodeep-scrub:
              description: Deep scrubbing is disabled (<0|1>)
            nodown:
              description: OSD failure reports are being ignored, such that the monitors will not mark OSDs down (<0|1>)
            noin:
              description: OSDs that were previously marked out will not be marked back in when they start (<0|1>)
            noout:
              description: OSDs will not automatically be marked out after the configured intervale (<0|1>)
            norebalance:
              description: Rebalancing of PGs is suspended (<0|1>)
            norecover:
              description: Recovery of PGs is suspended (<0|1>)
            noscrub:
              description: Scrubbing is disabled (<0|1>)
            notieragent:
              description: Cache tiering activity is suspended (<0|1>)
            noup:
              description: OSDs are not allowed to start (<0|1>)
            pause:
              description: Pauses read and writes (<0|1>)
      context:
        flag:
          is_var: True
          description: Flag status
          actions:
            docs:
              description: Open PVE API docs for this endpoint in web browser
            get:
              description: Get the status of a specific ceph flag
            put:
              description: Set or clear (unset) a specific ceph flag
              params:
                value:
                  required: True
                  description: The new value of the flag
    metadata:
      description: Ceph metadata
      actions:
        docs:
          description: Open PVE API docs for this endpoint in web browser
        get:
          description: Get Ceph metadata
          params:
            scope:
              description: Scope (<all|versions>)
    status:
      description: Ceph status
      actions:
        docs:
          description: Open PVE API docs for this endpoint in web browser
        get:
          description: Get Ceph status
config:
  !inc context.d/include.d/cluster_config.yaml