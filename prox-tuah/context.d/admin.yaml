admin:
  description: "ADMIN mode"
  context:
    iso:
      description: ISO images
      actions:
        delete:
          description: Delete ISO
          run_func: delete_iso
          params:
            filename:
              required: True
              is_var: True
              description: Name of ISO to delete
        download:
          description: Download ISO from URL
          run_func: download_iso
          params:
            filename:
              required: True
              description: Name to save ISO as
            url:
              required: True
              description: URL to download
            node:
              description: Node that contains the storage for the ISO (defaults to random)
            storage:
              description: Storage to save ISO to (defaults to random)
        list:
          description: List all ISOs
          run_func: list_isos
          params:
            brief:
              is_fixed: True
              description: "Show brief information"
            detail:
              is_fixed: True
              description: "Show detailed information"
            storage:
              is_fixed: True
              description: "List ISO storage/node"
    node:
      description: PVE nodes
      actions:
        list:
          description: List all nodes
          run_func: list_nodes
          params:
            brief:
              is_fixed: True
              description: "Show brief information"
            detail:
              is_fixed: True
              description: "Show detailed information"
    template:
      description: "Templates"
      actions:
        delete:
          description: "Delete template(s)"
          run_func: delete_templates
          params:
            vmid(s):
              is_var: True
              description: Delete template or templates (comma-separated if multiple)
        list:
          description: "List all templates"
          run_func: show_templates
          params:
            brief:
              is_fixed: True
              description: "Show brief information"
            detail:
              is_fixed: True
              description: "Show detailed information"
      context:
        vmid:
          is_var: True
          description: "VMID"
          actions:
            clone:
              description: "Clone template to VM"
              run_func: clone_template
              params:
                newid:
                  description: "templateID for the clone (defaults to next available)"
                name:
                  description: "Name for the clone"
            delete:
              description: "Delete template"
              run_func: delete_template
            edit:
              description: "Edit template configuration"
              run_func: edit_template
              params:
                cores:
                  description: "Number of cores per socket"
                memory:
                  description: "Amount of memory in MB"
                sockets:
                  description: "Number of CPU sockets"
            show:
              description: "Show template information"
              run_func: show_template_info
              params:
                brief:
                  is_fixed: True
                  description: Show template information (brief)
                default:
                  is_fixed: True
                  description: Show template information
    vm:
      description: "Virtual machines"
      actions:
        delete:
          description: "Delete VM(s)"
          run_func: delete_vms
          params:
            vmid(s):
              is_var: True
              description: Delete VM or VMs (comma-separated if multiple)
        list:
          description: "List all VMs"
          run_func: show_vms
          params:
            brief:
              is_fixed: True
              description: "Show brief information"
            detail:
              is_fixed: True
              description: "Show detailed information"
      context:
        vmid:
          is_var: True
          description: "Virtual machine"
          actions:
            clone:
              description: "Clone VM"
              run_func: clone_vm
              params:
                newid:
                  description: "VMID for the clone (defaults to next available)"
                name:
                  description: "Name for the clone"
            connect:
              description: "Connect to VM (default: SPICE)"
              run_func: connect_vm
              params:
                protocol:
                  description: Connection protocol (<spice>)
            delete:
              description: "Delete VM"
              run_func: delete_vm
            edit:
              description: "Edit VM configuration"
              run_func: edit_vm
              params:
                cores:
                  description: "Number of cores per socket"
                memory:
                  description: "Amount of memory in MB"
                sockets:
                  description: "Number of CPU sockets"
            power:
              description: "Change VM power status"
              run_func: change_vm_status
              params:
                reboot:
                  is_fixed: True
                  description: Reboot VM
                shutdown:
                  is_fixed: True
                  description: Shutdown VM (clean)
                  run_func: change_vm_status
                start:
                  is_fixed: True
                  description: Start VM
                  run_func: change_vm_status
                stop:
                  is_fixed: True
                  description: Stop VM (immediate)
                  run_func: change_vm_status
            show:
              description: "Show VM information"
              run_func: show_vm_info
              params:
                brief:
                  is_fixed: True
                  description: Show VM information (brief)
                default:
                  is_fixed: True
                  description: Show VM information
                power:
                  is_fixed: True
                  description: Show VM power status
            template:
              description: "Convert VM to template"
              run_func: template_vm