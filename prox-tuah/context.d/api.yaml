api:
  description: "Enter Proxmox API mode"
  can_get: false
  context:
    access:
      description: "Enter access context"
    cluster:
      description: "Enter cluster context"
    nodes:
      description: "Enter nodes context"
      context:
        node_name:
          description: "Enter specific node's context"
          is_variable: true
          type: "string"
          context:
            apt:
              !inc context.d/include.d/node_apt.yaml
            capabilities:
              !inc context.d/include.d/node_capabilities.yaml
            ceph:
              !inc context.d/include.d/node_ceph.yaml
            certificates:
              !inc context.d/include.d/node_certificates.yaml
            disks:
              !inc context.d/include.d/node_disks.yaml
            firewall:
              !inc context.d/include.d/node_firewall.yaml
            hardware:
              !inc context.d/include.d/node_hardware.yaml
            lxc:
              !inc context.d/include.d/node_lxc.yaml
            network:
              !inc context.d/include.d/node_network.yaml
            qemu:
              !inc context.d/include.d/node_qemu.yaml
    pools:
      description: "Enter pools context"
    storage:
      description: "Enter storage context"
    version:
      description: "PVE version"
      actions:
        get:
          description: "Get API version details, including some parts of the global datacenter config"